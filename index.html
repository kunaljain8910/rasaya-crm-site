<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasaya CRM</title>

<!-- SEO -->
<meta name="description" content="Rasaya CRM - Jewellery Customer Journey Tracking Software">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#000;
  color:#fff;
  scroll-behavior:smooth;
}

/* NAV */
.nav {
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  z-index:100;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1 {
  font-size:70px;
}

.hero p {
  color:#aaa;
}

.btn {
  padding:14px 30px;
  border-radius:30px;
  background:linear-gradient(45deg,gold,orange);
  color:black;
  text-decoration:none;
  font-weight:bold;
  margin-top:20px;
}

/* FEATURES */
.section {
  padding:100px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:40px;
}

.card {
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

/* SLIDER */
.slider {
  overflow:hidden;
  max-width:800px;
  margin:auto;
}

.slides {
  display:flex;
  animation:slide 12s infinite;
}

.slides img {
  width:100%;
  border-radius:20px;
}

@keyframes slide {
  0% {transform:translateX(0)}
  33% {transform:translateX(-100%)}
  66% {transform:translateX(-200%)}
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  color:white;
}

/* ANIMATION */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.fade.show {
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<div class="nav">
  <h2>Rasaya CRM</h2>
</div>

<div class="hero fade">
  <h1>Control Every Customer</h1>
  <p>Jewellery CRM for Sales Growth</p>
  <a href="#" class="btn">Download</a>
</div>

<div class="section fade">
  <h2>Features</h2>
  <div class="grid">
    <div class="card">Customer Inward</div>
    <div class="card">Outward</div>
    <div class="card">Live Tokens</div>
    <div class="card">AI Agent</div>
    <div class="card">Reports</div>
    <div class="card">Tracking</div>
  </div>
</div>

<div class="section fade">
  <h2>Software Preview</h2>
  <div class="slider">
    <div class="slides">
      <img src="https://via.placeholder.com/800x400">
      <img src="https://via.placeholder.com/800x400">
      <img src="https://via.placeholder.com/800x400">
    </div>
  </div>
</div>

<div class="section fade">
  <h2>Download</h2>
  <a href="YOUR_EXE_LINK" class="btn">Download Software</a>
</div>

<a class="whatsapp" href="https://wa.me/919203119392">💬</a>

<script>

/* SCROLL ANIMATION */
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const rect = el.getBoundingClientRect().top;
    if(rect < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

/* DOWNLOAD TRACK */
document.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    console.log("Download clicked");
  });
});

</script>

</body>
</html>
